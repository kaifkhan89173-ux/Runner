<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eko - Universal AI Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' } } } }
        }
    </script>

    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Highlight.js for Code Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .markdown-body { font-size: 1rem; line-height: 1.6; word-wrap: break-word; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }
        .markdown-body code:not(pre code) { background-color: rgba(128,128,128,0.2); padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
        .markdown-body pre { background: #1e1e1e !important; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-body img { border-radius: 0.5rem; max-width: 100%; height: auto; margin: 1rem 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .cursor-blink::after { content: '▋'; animation: blink 1s step-start infinite; color: #3b82f6; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Loading Fallback -->
    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white dark:bg-gray-900">
        <div class="spinner mb-4"></div>
        <h2 class="text-xl font-bold">Eko is waking up...</h2>
    </div>

    <!-- 🔥 THE ZIDDI FAILSAFE: Forces loading to hide after 1.5 seconds NO MATTER WHAT 🔥 -->
    <script>
        setTimeout(function() {
            var loader = document.getElementById('loading');
            var app = document.getElementById('app');
            if (loader) loader.classList.add('hidden');
            if (app) app.classList.remove('hidden');
        }, 1500);
    </script>

    <!-- Main App Container -->
    <div id="app" class="flex-1 flex w-full relative min-h-screen hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden"></div>

        <!-- Left Sidebar -->
        <aside id="sidebar" class="fixed md:sticky top-0 left-0 h-[100dvh] w-72 bg-gray-50 dark:bg-gray-850 border-r border-gray-200 dark:border-gray-700 z-40 transform -translate-x-full md:translate-x-0 sidebar-transition flex flex-col">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <button id="btn-new-chat" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-xl font-medium transition-colors">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <button id="btn-settings" class="flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-blue-500 transition-colors">
                    <i class="fas fa-cog"></i> Settings
                </button>
                <button id="btn-theme" class="text-gray-600 dark:text-gray-300 hover:text-yellow-500 transition-colors p-2 rounded-lg">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col min-h-[100dvh] w-full relative bg-white dark:bg-gray-900">
            <header class="sticky top-0 z-20 flex items-center justify-between p-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <button id="btn-toggle-sidebar" class="md:hidden text-gray-600 dark:text-gray-300 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">Eko</h1>
                </div>
                
                <!-- NEW VOICE BUTTON ADDED HERE -->
                <div class="flex items-center gap-3">
                    <button id="btn-voice-toggle" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 transition-colors p-2 rounded-lg" title="Toggle Voice">
                        <i class="fas fa-volume-up text-lg"></i>
                    </button>
                    <div id="current-model-display" class="text-xs font-mono text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded"></div>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-32 scroll-smooth">
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center opacity-70">
                    <i class="fas fa-robot text-6xl text-blue-500 mb-4"></i>
                    <h2 class="text-2xl font-bold mb-2">Hello, I'm Eko.</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">How can I help you build, learn, or create today?</p>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white dark:from-gray-900 via-white dark:via-gray-900 to-transparent pt-10 pb-4 px-4 md:px-8">
                <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-2xl shadow-lg focus-within:ring-2 focus-within:ring-blue-500 p-2 transition-all">
                    <textarea id="chat-input" rows="1" placeholder="Message Eko..." class="w-full max-h-40 min-h-[44px] bg-transparent resize-none outline-none text-gray-900 dark:text-gray-100 py-2 px-3 flex-1 scrollbar-thin rounded-xl leading-relaxed" required></textarea>
                    <button type="submit" id="btn-send" class="h-11 w-11 flex-shrink-0 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors disabled:opacity-50">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white dark:bg-gray-850 rounded-2xl w-full max-w-md p-6 transform scale-95 transition-transform">
            <h2 class="text-2xl font-bold mb-4 flex items-center justify-between">
                Settings
                <button class="close-modal text-gray-500"><i class="fas fa-times"></i></button>
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key *</label>
                    <input type="password" id="input-api-key" placeholder="sk-or-v1-..." class="w-full bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model</label>
                    <input type="text" id="input-model" value="deepseek/deepseek-r1:free" class="w-full bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="input-system" rows="6" class="w-full bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 outline-none text-xs font-mono">You are Eko, an ultra-smart, friendly AI assistant. Act like a supportive "bro" and a highly capable AI assistant. Mirror the user language (Hindi/Hinglish/English). CRITICAL IMAGE RULE: If the user asks to generate an image or logo, silently output: ![Generated Image](https://image.pollinations.ai/prompt/YOUR-DETAILED-PROMPT) Replace YOUR-DETAILED-PROMPT with detailed English keywords ONLY.</textarea>
                </div>
                <button id="btn-save-settings" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg mt-2">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        // Use a Try-Catch block so if anything fails, the app still loads
        let STATE = {};
        try {
            let savedSettings = JSON.parse(localStorage.getItem('eko_settings')) || {};
            if (typeof savedSettings.voiceEnabled === 'undefined') {
                savedSettings.voiceEnabled = true;
            }

            STATE = {
                chats: JSON.parse(localStorage.getItem('eko_chats')) || [],
                currentChatId: null,
                settings: {
                    apiKey: savedSettings.apiKey || '',
                    model: savedSettings.model || 'openai/gpt-oss-120b:free', 
                    systemPrompt: savedSettings.systemPrompt || 'You are Eko, an ultra-smart, friendly AI assistant. Act like a supportive "bro" and a highly capable AI assistant. Mirror the user language (Hindi/Hinglish/English). CRITICAL IMAGE RULE: If the user asks to generate an image or logo, silently output: ![Generated Image](https://image.pollinations.ai/prompt/YOUR-DETAILED-PROMPT) Replace YOUR-DETAILED-PROMPT with detailed English keywords ONLY.',
                    darkMode: typeof savedSettings.darkMode !== 'undefined' ? savedSettings.darkMode : true,
                    voiceEnabled: savedSettings.voiceEnabled
                },
                isGenerating: false
            };
        } catch (e) {
            console.error("Storage Error, resetting state.");
            STATE = { chats: [], currentChatId: null, settings: { apiKey: '', model: 'openai/gpt-oss-120b:free', systemPrompt: '', darkMode: true, voiceEnabled: true }, isGenerating: false };
        }

        const els = {
            app: document.getElementById('app'), loading: document.getElementById('loading'),
            sidebar: document.getElementById('sidebar'), sidebarOverlay: document.getElementById('sidebar-overlay'),
            chatContainer: document.getElementById('chat-container'), chatList: document.getElementById('chat-list'),
            chatForm: document.getElementById('chat-form'), chatInput: document.getElementById('chat-input'),
            btnSend: document.getElementById('btn-send'), btnToggleSidebar: document.getElementById('btn-toggle-sidebar'),
            btnNewChat: document.getElementById('btn-new-chat'), btnTheme: document.getElementById('btn-theme'),
            btnSettings: document.getElementById('btn-settings'), welcomeScreen: document.getElementById('welcome-screen'),
            settingsModal: document.getElementById('settings-modal'), inputApiKey: document.getElementById('input-api-key'),
            inputModel: document.getElementById('input-model'), inputSystem: document.getElementById('input-system'),
            btnSaveSettings: document.getElementById('btn-save-settings'), closeModalBtns: document.querySelectorAll('.close-modal'),
            currentModelDisplay: document.getElementById('current-model-display'),
            btnVoiceToggle: document.getElementById('btn-voice-toggle')
        };

        function applyVoiceUI() {
            if (!els.btnVoiceToggle) return;
            const icon = els.btnVoiceToggle.querySelector('i');
            if (STATE.settings.voiceEnabled) {
                icon.className = 'fas fa-volume-up text-lg';
                els.btnVoiceToggle.classList.add('text-blue-500');
            } else {
                icon.className = 'fas fa-volume-mute text-lg';
                els.btnVoiceToggle.classList.remove('text-blue-500');
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }
        }

        function toggleVoice() {
            STATE.settings.voiceEnabled = !STATE.settings.voiceEnabled;
            applyVoiceUI();
            saveState();
        }

        function speakAIResponse(text) {
            try {
                if (!STATE.settings.voiceEnabled || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/!\[.*?\]\(.*?\)/g, '').replace(/\[.*?\]\(.*?\)/g, '').replace(/```[\s\S]*?
```/g, 'Code generate kiya hai bro.').replace(/[*#_`~]/g, '').trim();
                if (!cleanText) return;
                const utterance = new SpeechSynthesisUtterance(cleanText);
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.lang.includes('hi') || v.lang.includes('en-IN'));
                if (preferredVoice) utterance.voice = preferredVoice;
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                console.warn("Speech error:", e);
            }
        }

        function init() {
            try {
                applyTheme();
                applyVoiceUI(); 
                if (els.btnVoiceToggle) els.btnVoiceToggle.addEventListener('click', toggleVoice); 
                
                if ('speechSynthesis' in window) {
                    try { window.speechSynthesis.getVoices(); } catch(e) {}
                }

                if (typeof marked !== 'undefined') {
                    marked.setOptions({
                        highlight: function(code, lang) {
                            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                            return hljs.highlight(code, { language }).value;
                        },
                        breaks: true
                    });
                }

                els.chatInput.addEventListener('input', function() {
                    this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
                    if(this.value === '') this.style.height = 'auto';
                });

                els.chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!STATE.isGenerating && els.chatInput.value.trim() !== '') els.chatForm.dispatchEvent(new Event('submit'));
                    }
                });

                els.chatForm.addEventListener('submit', handleSend);
                els.btnSettings.addEventListener('click', () => openModal(els.settingsModal));
                els.closeModalBtns.forEach(btn => btn.addEventListener('click', () => closeModal(els.settingsModal)));
                els.btnSaveSettings.addEventListener('click', saveSettings);
                els.btnTheme.addEventListener('click', toggleTheme);
                els.btnToggleSidebar.addEventListener('click', toggleSidebar);
                els.sidebarOverlay.addEventListener('click', toggleSidebar);
                els.btnNewChat.addEventListener('click', createNewChat);

                els.inputApiKey.value = STATE.settings.apiKey; els.inputModel.value = STATE.settings.model; els.inputSystem.value = STATE.settings.systemPrompt;
                els.currentModelDisplay.textContent = STATE.settings.model.split('/').pop();

                renderChatList();
                if (STATE.chats.length > 0) loadChat(STATE.chats[0].id); else els.welcomeScreen.classList.remove('hidden');

                setTimeout(() => {
                    els.loading.classList.add('hidden'); els.app.classList.remove('hidden');
                    if (!STATE.settings.apiKey) openModal(els.settingsModal);
                }, 800);
            } catch (initError) {
                console.error("Error during init:", initError);
            }
        }

        function applyTheme() {
            const html = document.documentElement; const icon = els.btnTheme.querySelector('i');
            if (STATE.settings.darkMode) { html.classList.add('dark'); icon.classList.replace('fa-moon', 'fa-sun'); } 
            else { html.classList.remove('dark'); icon.classList.replace('fa-sun', 'fa-moon'); }
        }

        function toggleTheme() { STATE.settings.darkMode = !STATE.settings.darkMode; applyTheme(); saveState(); }
        function toggleSidebar() {
            if (els.sidebar.classList.contains('-translate-x-full')) { els.sidebar.classList.remove('-translate-x-full'); els.sidebarOverlay.classList.remove('hidden'); } 
            else { els.sidebar.classList.add('-translate-x-full'); els.sidebarOverlay.classList.add('hidden'); }
        }

        function openModal(modal) { modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); modal.firstElementChild.classList.remove('scale-95'); }, 10); }
        function closeModal(modal) { modal.classList.add('opacity-0'); modal.firstElementChild.classList.add('scale-95'); setTimeout(() => { modal.classList.add('hidden'); }, 300); }

        function saveSettings() {
            STATE.settings.apiKey = els.inputApiKey.value.trim(); STATE.settings.model = els.inputModel.value.trim(); STATE.settings.systemPrompt = els.inputSystem.value.trim();
            els.currentModelDisplay.textContent = STATE.settings.model.split('/').pop(); saveState(); closeModal(els.settingsModal);
        }

        function saveState() { localStorage.setItem('eko_chats', JSON.stringify(STATE.chats)); localStorage.setItem('eko_settings', JSON.stringify(STATE.settings)); }

        function createNewChat() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            const newChat = { id: Date.now().toString(), title: 'New Chat', messages: [] };
            STATE.chats.unshift(newChat); STATE.currentChatId = newChat.id; saveState(); renderChatList(); renderChatWindow();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function loadChat(id) {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            STATE.currentChatId = id; renderChatList(); renderChatWindow();
            if(window.innerWidth < 768 && !els.sidebar.classList.contains('-translate-x-full')) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation(); if(!confirm("Delete this chat?")) return;
            STATE.chats = STATE.chats.filter(c => c.id !== id);
            if(STATE.currentChatId === id) STATE.currentChatId = STATE.chats.length > 0 ? STATE.chats[0].id : null;
            saveState(); renderChatList(); renderChatWindow();
        }

        function renderChatList() {
            els.chatList.innerHTML = '';
            STATE.chats.forEach(chat => {
                const div = document.createElement('div'); const isActive = chat.id === STATE.currentChatId;
                div.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-gray-800 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-200 dark:hover:bg-gray-800'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<div class="flex items-center gap-3 overflow-hidden"><i class="far fa-message"></i><span class="truncate text-sm font-medium">${chat.title}</span></div><button class="opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 p-1" onclick="deleteChat('${chat.id}', event)"><i class="fas fa-trash-alt text-xs"></i></button>`;
                els.chatList.appendChild(div);
            });
        }

        function renderChatWindow() {
            els.chatContainer.innerHTML = '';
            if (!STATE.currentChatId) { els.chatContainer.appendChild(els.welcomeScreen); els.welcomeScreen.classList.remove('hidden'); return; }
            els.welcomeScreen.classList.add('hidden');
            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            chat.messages.forEach(msg => appendMessageToUI(msg.role, msg.content, false));
            scrollToBottom();
        }

        function fixImageMarkdown(text) {
            return text.replace(/!\[.*?\]\((https:\/\/image\.pollinations\.ai\/prompt\/)([^)]+)\)/g, function(match, baseUrl, promptText) {
                let cleanPrompt = promptText.split('?')[0]; 
                let safeEncodedPrompt = encodeURIComponent(cleanPrompt.trim());
                return `![Generated Image](${baseUrl}${safeEncodedPrompt}?nologo=true)`;
            });
        }

        function appendMessageToUI(role, content, isStreaming = false) {
            const isUser = role === 'user'; const msgDiv = document.createElement('div');
            msgDiv.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            let safeContent = content;
            if(!isUser) {
                const fixedContent = fixImageMarkdown(content);
                const rawHtml = (typeof marked !== 'undefined') ? marked.parse(fixedContent) : fixedContent;
                safeContent = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['class', 'target'] }) : rawHtml;
            }

            msgDiv.innerHTML = `
                <div class="max-w-[85%] md:max-w-[75%] rounded-2xl p-4 shadow-sm ${isUser ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white dark:bg-gray-850 text-gray-900 dark:text-gray-100 rounded-bl-none border border-gray-200 dark:border-gray-700 markdown-body'}">
                    ${isUser ? escapeHTML(content).replace(/\n/g, '<br>') : safeContent}
                    ${isStreaming ? '<span class="cursor-blink"></span>' : ''}
                </div>
            `;
            els.chatContainer.appendChild(msgDiv);
            return msgDiv.querySelector('.markdown-body');
        }

        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag])); }
        function scrollToBottom() { els.chatContainer.scrollTo({ top: els.chatContainer.scrollHeight, behavior: 'smooth' }); }

        async function handleSend(e) {
            e.preventDefault();
            if (!STATE.settings.apiKey) { alert("Please add your OpenRouter API Key in Settings first."); openModal(els.settingsModal); return; }
            const text = els.chatInput.value.trim(); if (!text || STATE.isGenerating) return;

            if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 

            if (!STATE.currentChatId) createNewChat();
            const chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            if (chat.messages.length === 0) { chat.title = text.length > 25 ? text.substring(0, 25) + '...' : text; renderChatList(); }

            chat.messages.push({ role: 'user', content: text });
            appendMessageToUI('user', text);
            els.chatInput.value = ''; els.chatInput.style.height = 'auto'; scrollToBottom(); saveState();

            STATE.isGenerating = true; els.btnSend.disabled = true; els.btnSend.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const aiContentContainer = appendMessageToUI('assistant', '', true); scrollToBottom();

            const messagesPayload = [];
            if (STATE.settings.systemPrompt) messagesPayload.push({ role: 'system', content: STATE.settings.systemPrompt });
            messagesPayload.push(...chat.messages.slice(-10));

            let aiFullText = "";
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.settings.apiKey}`, 'HTTP-Referer': window.location.href, 'X-Title': 'Eko App' },
                    body: JSON.stringify({ model: STATE.settings.model, messages: messagesPayload, stream: true })
                });

                if (!response.ok) throw new Error((await response.json()).error?.message || "API Error");

                const reader = response.body.getReader(); const decoder = new TextDecoder("utf-8"); let buffer = "";
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ') && trimmed !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(trimmed.slice(6));
                                if (data.choices && data.choices[0].delta.content) {
                                    aiFullText += data.choices[0].delta.content;
                                    
                                    // Progressive Render
                                    const fixedContent = fixImageMarkdown(aiFullText);
                                    const rawHtml = (typeof marked !== 'undefined') ? marked.parse(fixedContent) : fixedContent;
                                    aiContentContainer.innerHTML = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(rawHtml) : rawHtml;
                                    aiContentContainer.innerHTML += '<span class="cursor-blink"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                aiFullText = `**Error:** ${error.message}`; 
                aiContentContainer.innerHTML = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(aiFullText) : aiFullText;
            } finally {
