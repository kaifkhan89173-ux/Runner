<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>City Rush 3D - New Slide Anim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#87CEEB;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
canvas{display:block;width:100vw;height:100vh}

/* HUD Styling */
#hud{position:fixed;top:env(safe-area-inset-top, 15px);left:0;right:0;display:none;pointer-events:none;z-index:9999}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;background:linear-gradient(180deg,rgba(0,0,0,.6) 0,transparent 100%);text-shadow: 1px 1px 3px rgba(0,0,0,0.8);}
#score{font-size:32px;font-weight:900;color:#fff;letter-spacing:1px}
#coins{font-size:20px;font-weight:800;color:#FFD700; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px;}
#speed-bar{font-size:14px;color:#a0e0ff;font-weight:700; text-transform: uppercase; letter-spacing: 1px;}
#hearts{display:flex;gap:5px; margin-top: 5px;}
.heart::before{content:'❤️';font-size:22px;}
.heart.dead::before{content:'🖤'; opacity: 0.5;}

/* SCREENS */
#start-screen,#over-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(15,32,39,0.9),rgba(44,83,100,0.9));z-index:20;padding:20px;backdrop-filter:blur(5px);color:#fff;}
#over-screen{display:none} 
.game-logo{font-size:52px;font-weight:900;color:#FF8C00;margin-bottom:4px;}
.btn{width:100%;max-width:320px;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:900;cursor:pointer;margin-bottom:10px;text-transform: uppercase;}
.btn-primary{background:linear-gradient(135deg,#FF8C00,#FF5733);color:#fff;}
.best-tag{font-size:14px;color:#80d8ff;margin-bottom:16px;font-weight:800;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-top">
    <div><div id="score">0</div><div id="speed-bar">14 km/h</div></div>
    <div id="hearts"></div>
    <div id="coins">● 0</div>
  </div>
</div>

<div id="start-screen">
  <div class="game-logo">CITY RUSH</div>
  <div class="best-tag">TAP TO START</div>
  <button class="btn btn-primary" onclick="startGame()">▶ PLAY NOW</button>
</div>

<div id="over-screen">
  <h1 style="color:#ff4444; font-size:48px">WASTED</h1>
  <div id="final-score" style="font-size:32px; margin:20px 0">0</div>
  <button class="btn btn-primary" onclick="restartGame()">↩ TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// --- GAME SETTINGS ---
const LANE_X=[-2.2,0,2.2];
const TILE_LEN=30, TILE_COUNT=7, SPAWN_Z=-50, DESPAWN_Z=10, CHAR_Z=0;
let state="menu", score=0, coins=0, lives=3, speed=14;
let targetLane=0, charX=0, charY=0, yVel=0, playerAction="run";
let isInvincible=false, slideTimer=0, wasJump=false, wasSlide=false;

// --- THREE.JS SETUP ---
const scene=new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,250);
camera.position.set(0, 5, 9);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun=new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
scene.add(sun);

// --- CHARACTER SYSTEM ---
const charGroup=new THREE.Group();
scene.add(charGroup);
let mixer, activeAction, charActions={};

// NEW FILE IS SET HERE
const currentHeroFile = "running_slide (1).glb"; 
const heroScale = 1.5;

function loadHero() {
    const loader = new THREE.GLTFLoader();
    loader.load(currentHeroFile, (gltf) => {
        while(charGroup.children.length > 0) charGroup.remove(charGroup.children[0]);
        const model = gltf.scene;
        model.scale.set(heroScale, heroScale, heroScale);
        model.rotation.y = Math.PI;
        charGroup.add(model);

        mixer = new THREE.AnimationMixer(model);
        charActions = {};
        gltf.animations.forEach(clip => {
            let n = clip.name.toLowerCase();
            // Map animation names from the GLB file
            if(n.includes("run") || n.includes("walk")) charActions.run = mixer.clipAction(clip);
            if(n.includes("jump")) charActions.jump = mixer.clipAction(clip);
            if(n.includes("slide") || n.includes("down")) charActions.slide = mixer.clipAction(clip);
        });

        // Set default animation if 'run' isn't explicitly found
        if(!charActions.run && gltf.animations[0]) charActions.run = mixer.clipAction(gltf.animations[0]);
        activeAction = charActions.run;
        if(activeAction) activeAction.play();
    });
}

function switchAnim(name) {
    if(!charActions[name] || activeAction === charActions[name]) return;
    const prev = activeAction;
    activeAction = charActions[name];
    activeAction.reset().fadeIn(0.2).play();
    prev.fadeOut(0.2);
}

// Initial Load
loadHero();

// --- WORLD GENERATION (Simplified Floor) ---
function box(w,h,d,c){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color:c}));}
const road=box(7.5, 0.1, 500, 0x333333);
road.position.z = -200;
scene.add(road);

// --- INPUTS ---
window.addEventListener("keydown", e => {
    if(state!=="playing") return;
    if(e.code==="ArrowLeft") targetLane=Math.max(-1, targetLane-1);
    if(e.code==="ArrowRight") targetLane=Math.min(1, targetLane+1);
    if(e.code==="ArrowUp" && playerAction==="run") playerAction="jump";
    if(e.code==="ArrowDown" && playerAction==="run") playerAction="slide";
});

// Touch Inputs
let touchStartX = 0;
let touchStartY = 0;
window.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
window.addEventListener("touchend", e => {
    if(state!=="playing") return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > Math.abs(dy)) {
        if(dx > 30) targetLane=Math.min(1, targetLane+1);
        else if(dx < -30) targetLane=Math.max(-1, targetLane-1);
    } else {
        if(dy < -30 && playerAction==="run") playerAction="jump";
        else if(dy > 30 && playerAction==="run") playerAction="slide";
    }
});

// --- GAME LOOP ---
let lastT = performance.now();
function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;

    if(state==="playing") {
        updateGame(dt);
        if(mixer) mixer.update(dt);
    }
    
    // Smooth Camera
    camera.position.x = THREE.MathUtils.lerp(camera.position.x, charX * 0.5, dt * 5);
    camera.lookAt(charX, 1, -5);
    
    renderer.render(scene, camera);
}

function updateGame(dt) {
    score += Math.floor(speed * dt);
    document.getElementById("score").textContent = score;

    // Movement
    const tX = LANE_X[targetLane+1];
    charX += (tX - charX) * dt * 15;

    // Jump logic
    if(playerAction === "jump") {
        if(!wasJump) { yVel = 12; wasJump = true; switchAnim("jump"); }
        yVel -= 30 * dt;
        charY += yVel * dt;
        if(charY <= 0) { charY = 0; playerAction = "run"; wasJump = false; switchAnim("run"); }
    }

    // SLIDE LOGIC (Linked to new GLB animation)
    if(playerAction === "slide") {
        if(!wasSlide) { 
            slideTimer = 0; 
            wasSlide = true; 
            switchAnim("slide"); 
        }
        slideTimer += dt;
        
        // Slide duration (adjust based on your glb clip length)
        // If the animation is longer or shorter than 0.8s, change this value.
        if(slideTimer > 0.8) { 
            playerAction = "run"; 
            wasSlide = false; 
            switchAnim("run"); 
        }
    }

    charGroup.position.set(charX, charY, 0);
}

window.startGame = () => {
    state="playing";
    score=0;
    document.getElementById("start-screen").style.display="none";
    document.getElementById("hud").style.display="block";
};

function restartGame() {
    location.reload();
}

loop();
</script>
</body>
</html>
