<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>City Rush 3D - Down Anim Updated</title>
<style>
/* ... (Style same rahega jo pehle tha) ... */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#87CEEB;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:15px;left:0;right:0;display:none;pointer-events:none;z-index:9999}
#hud-top{display:flex;justify-content:space-between;padding:12px 16px;text-shadow:1px 1px 3px #000;}
#score{font-size:32px;font-weight:900;color:#fff}
#start-screen,#over-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(15,32,39,0.9),rgba(44,83,100,0.9));z-index:20;color:#fff}
.btn{padding:16px 40px;border:none;border-radius:14px;font-size:18px;font-weight:900;cursor:pointer;background:#FF8C00;color:#fff;margin-top:20px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="hud-top"><div id="score">0</div><div id="coins">● 0</div></div></div>

<div id="start-screen">
  <h1>CITY RUSH 3D</h1>
  <button class="btn" onclick="startGame()">▶ PLAY NOW</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// --- CORE SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// --- PLAYER & ANIMATION SYSTEM ---
let mixer, activeAction, charActions = {};
const charGroup = new THREE.Group();
scene.add(charGroup);

let playerAction = "run";
let slideTimer = 0;

// Model Load karne ka function (Placeholder path use kiya hai)
const loader = new THREE.GLTFLoader();
loader.load('azri_running_animation.glb', (gltf) => {
    const model = gltf.scene;
    charGroup.add(model);
    
    mixer = new THREE.AnimationMixer(model);
    gltf.animations.forEach(clip => {
        let name = clip.name.toLowerCase();
        if(name.includes("run")) charActions.run = mixer.clipAction(clip);
        if(name.includes("jump")) charActions.jump = mixer.clipAction(clip);
        // "Down" ya "Slide" animation check
        if(name.includes("slide") || name.includes("down") || name.includes("roll")) {
            charActions.slide = mixer.clipAction(clip);
        }
    });
    
    activeAction = charActions.run;
    if(activeAction) activeAction.play();
});

function switchAnimation(newAnim) {
    if(!charActions[newAnim] || activeAction === charActions[newAnim]) return;
    let prevAction = activeAction;
    activeAction = charActions[newAnim];
    activeAction.reset().fadeIn(0.2).play();
    prevAction.fadeOut(0.2);
}

// --- GAME LOOP ---
function update(dt) {
    if(playerAction === "slide") {
        slideTimer += dt;
        
        // DOWN ANIM LOGIC:
        // 1. Agar model mein animation hai toh wo chalega
        if(charActions.slide) {
            switchAnimation("slide");
        } else {
            // 2. Agar animation nahi hai, toh character ko "Squash" kar do (Scale down)
            charGroup.scale.y = THREE.MathUtils.lerp(charGroup.scale.y, 0.5, dt * 10);
            charGroup.position.y = -0.5; // Thoda niche shift
        }

        // 0.7 seconds baad wapas khada ho jaye
        if(slideTimer > 0.7) {
            playerAction = "run";
            slideTimer = 0;
            switchAnimation("run");
        }
    } else {
        // Normal state mein wapas scale 1 kar do
        charGroup.scale.y = THREE.MathUtils.lerp(charGroup.scale.y, 1, dt * 10);
        charGroup.position.y = 0;
    }

    if(mixer) mixer.update(dt);
}

// Input Detection
window.addEventListener("keydown", (e) => {
    if(e.code === "ArrowDown" || e.code === "KeyS") {
        if(playerAction === "run") {
            playerAction = "slide";
            slideTimer = 0;
        }
    }
});

// Start Game
window.startGame = () => {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    animate();
};

let lastTime = 0;
function animate(now = 0) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    update(dt);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
camera.position.set(0, 3, 6);
camera.lookAt(0, 1, 0);
</script>
</body>
</html>
